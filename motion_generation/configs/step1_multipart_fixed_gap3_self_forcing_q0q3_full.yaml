paths:
  base_model: checkpoints/llm
  output_dir: checkpoints/step1_multipart_fixed_gap3_self_forcing_q0q3_full
  data_dir: SuSuInterActs/SuSuInterActs
  motion_token_dir: SuSuInterActs/SuSuInterActs/motion_token_data_multipart_causal_512x4
  mimi_token_dir: SuSuInterActs/SuSuInterActs/audio_tokens_mimi_12p5hz_8cb
  text_json: SuSuInterActs/SuSuInterActs/text_data/motion2text.json
  train_split: SuSuInterActs/SuSuInterActs/split/train_file_list.txt
  eval_split: SuSuInterActs/SuSuInterActs/split/val_file_list.txt

data:
  fixed_gap: 3
  max_length: 2560
  # Duplicated here so existing evaluation notebooks that consume only the
  # data section reconstruct the same tensors as the model checkpoint.
  mimi_codebooks_used: [0, 1, 2, 3]
  num_workers: 4
  # set_epoch() changes the mixed known seed each epoch; worker copies must be
  # recreated so they observe it.
  persistent_workers: false
  require_causal_motion: true
  max_duration_mismatch_seconds: 0.12
  seed_mode: mixed_known
  neutral_seed_json: null
  neutral_seed_probability: 0.5
  previous_seed_probability: 0.5

  # Legacy disk-cache curriculum remains disabled. Histories are produced
  # on-policy in GPU memory by the generated_history section below.
  generated_anchor_dir: null
  generated_prefix_probability: 0.0

audio:
  mimi_codebooks_used: [0, 1, 2, 3]
  fusion: concat_linear
  sparse_audio_embedding: true

generated_history:
  enabled: true
  decoding: greedy
  minimum_teacher_epochs: 5
  ramp_epochs: 10
  max_probability: 0.5
  rollout_microbatch_size: 8

  # Gate self-forcing until the fresh q0-q3 planner is measurably non-random.
  rollout_eval_clips: 64
  teacher_forced_ce_max: 5.4
  rollout_accuracy_min: 0.01
  rollout_q0_accuracy_min: 0.03

  rollout_eval_epochs: [5, 15, 25, 35, 50]
  milestone_epochs: [5, 15, 25, 35, 50]

training:
  seed: 42
  num_train_epochs: 50
  per_device_train_batch_size: 32
  per_device_eval_batch_size: 32
  gradient_accumulation_steps: 1
  learning_rate: 2.0e-5
  weight_decay: 0.01
  adam_betas: [0.9, 0.95]
  adam_epsilon: 1.0e-8
  warmup_ratio: 0.03
  max_grad_norm: 1.0
  bf16: true
  gradient_checkpointing: true
  logging_steps: 10
  # Full validation runs at every epoch. Milestones are handled above.
  eval_steps: 0
  save_steps: 0
  save_best: true
  early_stopping_patience: 0
  early_stopping_min_delta: 0.0

monitoring:
  report_to: wandb
  wandb_project: sentiavatar-step1-planner
  wandb_run_name: step1_fixed_gap3_q0q3_self_forcing_full50
  wandb_tags: [phase1, step1, qwen, mimi-q0q3, multipart, fixed-gap3, causal, self-forcing, full-data]
  wandb_mode: online
  wandb_entity: null
